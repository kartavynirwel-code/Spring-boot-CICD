<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Integration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --border: #1e2d45;
            --green: #00ff88;
            --green-dim: #00ff8822;
            --green-mid: #00ff8855;
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #38bdf8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.4;
            animation: gridPulse 6s ease-in-out infinite;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.2; }
        }

        /* Glow orb */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, #00ff8812 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orbPulse 4s ease-in-out infinite;
        }

        @keyframes orbPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.7; }
        }

        .card {
            position: relative;
            z-index: 10;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 56px 64px;
            max-width: 640px;
            width: 90%;
            text-align: center;
            box-shadow:
                    0 0 0 1px #00ff8818,
                    0 0 60px #00ff8810,
                    0 32px 64px #00000060;
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(32px);
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--green-dim);
            border: 1px solid var(--green-mid);
            border-radius: 999px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 500;
            color: var(--green);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 32px;
            animation: badgeIn 0.6s 0.3s ease both;
        }

        @keyframes badgeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .dot {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 1.4s ease-in-out infinite;
            box-shadow: 0 0 8px var(--green);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .checkmark {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--green-dim);
            border: 2px solid var(--green-mid);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 32px;
            animation: checkIn 0.5s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes checkIn {
            from { opacity: 0; transform: scale(0); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 16px;
            animation: textIn 0.6s 0.5s ease both;
        }

        @keyframes textIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 span {
            color: var(--green);
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.875rem;
            line-height: 1.7;
            margin-bottom: 40px;
            animation: textIn 0.6s 0.6s ease both;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin-bottom: 32px;
            animation: textIn 0.6s 0.65s ease both;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            animation: textIn 0.6s 0.7s ease both;
        }

        .meta-item {
            background: #0d1525;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            text-align: left;
        }

        .meta-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
        }

        .meta-value.green {
            color: var(--green);
        }

        .footer-text {
            margin-top: 32px;
            font-size: 11px;
            color: var(--muted);
            animation: textIn 0.6s 0.8s ease both;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="status-badge">
        <span class="dot"></span>
        Pipeline Active
    </div>

    <div class="checkmark">✓</div>

    <h1>You have successfully<br>integrated the <span>pipeline by Kartavya </span></h1>

    <p class="subtitle">
        Your Spring Boot application is up and running.<br>
        The deployment pipeline connected successfully.
    </p>

    <div class="divider"></div>

    <div class="meta-grid">
        <div class="meta-item">
            <div class="meta-label">Status</div>
            <div class="meta-value green">● Operational</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">Framework</div>
            <div class="meta-value">Spring Boot 3.2</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">Server Port</div>
            <div class="meta-value">:8080</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">Java Version</div>
            <div class="meta-value">21 (LTS)</div>
        </div>
    </div>

    <p class="footer-text">pipeline-demo · v0.0.1-SNAPSHOT</p>
</div>
</body>
</html>
