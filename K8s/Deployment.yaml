apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-spring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-spring-app
  template:
    metadata:
      labels:
        app: devops-spring-app
    spec:
      containers:
      - name: devops-spring-app
        image: devops-spring-app:latest
        ports:
        - containerPort: 8080