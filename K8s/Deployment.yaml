apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-app
  template:
    metadata:
      labels:
        app: spring-app
    spec:
      containers:
      - name: spring-app
        image: my-boot:latest   # fallback; Jenkins will override with BUILD_NUMBER
        imagePullPolicy: Never  # keep this — image is local to minikube
        ports:
        - containerPort: 8080
